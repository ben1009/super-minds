name: Quick Validation

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Quick Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Validate Project Structure
      run: |
        echo "🔍 Validating Project Structure..."
        
        # Required files check
        for file in "index.html" "ga.js" "css/common.css" "js/common.js"; do
          if [ -f "$file" ]; then
            echo "  ✅ $file"
          else
            echo "  ❌ $file missing!"
            exit 1
          fi
        done
        
    - name: Check for Duplicate ga.js
      run: |
        echo ""
        echo "🔍 Checking for duplicate ga.js..."
        
        if [ -f "super-minds-baseball/ga.js" ]; then
          echo "  ❌ Duplicate ga.js found in super-minds-baseball/"
          exit 1
        else
          echo "  ✅ No duplicate ga.js"
        fi
        
    - name: Validate Shared Resource References
      run: |
        echo ""
        echo "🔍 Validating Shared Resource References..."
        
        ERRORS=0
        
        # Check main pages reference shared CSS
        for file in index.html unit7/present-continuous-course.html unit7/present-continuous-homework.html; do
          if grep -q "common.css" "$file"; then
            echo "  ✅ $file → common.css"
          else
            echo "  ❌ $file missing common.css!"
            ERRORS=$((ERRORS + 1))
          fi
        done
        
        # Check main pages reference shared JS
        for file in index.html unit7/present-continuous-course.html unit7/present-continuous-homework.html; do
          if grep -q "common.js" "$file"; then
            echo "  ✅ $file → common.js"
          else
            echo "  ❌ $file missing common.js!"
            ERRORS=$((ERRORS + 1))
          fi
        done
        
        if [ $ERRORS -gt 0 ]; then
          exit 1
        fi
        
    - name: Check Baseball Pages Reference
      run: |
        echo ""
        echo "🔍 Checking Baseball Pages..."
        
        for file in super-minds-baseball/index.html \
                    super-minds-baseball/unit7/baseball-present-continuous-course.html \
                    super-minds-baseball/unit7/baseball-present-continuous-homework.html \
                    super-minds-baseball/unit8/baseball-gerunds-ball-sports.html; do
          if [ -f "$file" ]; then
            if grep -q '\.\./ga\.js' "$file"; then
              echo "  ✅ $file uses ../ga.js"
            else
              echo "  ⚠️ $file may not reference ga.js correctly"
            fi
          fi
        done
        
    - name: Validate HTML Structure
      run: |
        echo ""
        echo "🔍 Validating HTML Structure..."
        
        # Check for basic HTML structure
        for file in index.html unit7/present-continuous-course.html unit7/present-continuous-homework.html unit8/gerunds-ball-sports.html unit8/amazing-vehicles-reading.html unit8/fun-things-we-do-reading.html unit8/question-words-grammar-homework.html unit9/holiday-plans-grammar-review.html; do
          if [ -f "$file" ]; then
            # Check for doctype
            if head -1 "$file" | grep -qi "<!doctype html>"; then
              echo "  ✅ $file has DOCTYPE"
            else
              echo "  ❌ $file missing DOCTYPE!"
              exit 1
            fi
            
            # Check for viewport meta
            if grep -q 'name="viewport"' "$file"; then
              echo "  ✅ $file has viewport meta"
            else
              echo "  ⚠️ $file missing viewport meta"
            fi
          fi
        done
        
    - name: Validate Favicon
      run: |
        echo ""
        echo "🔍 Validating Favicon..."
        
        ERRORS=0
        
        # Check favicon.svg exists
        if [ -f "favicon.svg" ]; then
          echo "  ✅ favicon.svg exists"
        else
          echo "  ❌ favicon.svg missing!"
          ERRORS=$((ERRORS + 1))
        fi
        
        # Check all pages have favicon
        for file in index.html unit7/*.html unit8/*.html unit9/*.html super-minds-baseball/index.html super-minds-baseball/unit7/*.html super-minds-baseball/unit8/*.html; do
          if [ -f "$file" ]; then
            if grep -q 'rel="icon"' "$file"; then
              echo "  ✅ $file has favicon"
            else
              echo "  ❌ $file missing favicon!"
              ERRORS=$((ERRORS + 1))
            fi
          fi
        done
        
        if [ $ERRORS -gt 0 ]; then
          exit 1
        fi
        
    - name: Validate Reading Page Navigation
      run: |
        echo ""
        echo "🔍 Validating Reading Page Navigation Links..."
        
        ERRORS=0
        
        # Check that reading.html is linked from all relevant pages
        for file in index.html unit7/present-continuous-course.html unit7/present-continuous-homework.html unit8/gerunds-ball-sports.html unit8/amazing-vehicles-reading.html unit8/question-words-grammar-homework.html unit9/holiday-plans-grammar-review.html; do
          if [ -f "$file" ]; then
            if grep -q 'window.NAV_CONFIG' "$file"; then
              echo "  ✅ $file uses centralized nav"
            elif grep -q 'fun-things-we-do-reading.html' "$file"; then
              echo "  ✅ $file links to reading.html"
            else
              echo "  ❌ $file missing link to reading.html!"
              ERRORS=$((ERRORS + 1))
            fi
          fi
        done
        
        # Verify common.js has reading page links
        if grep -q 'fun-things-we-do-reading.html' js/common.js; then
          echo "  ✅ js/common.js contains reading.html navigation links"
        else
          echo "  ❌ js/common.js missing reading.html navigation links!"
          ERRORS=$((ERRORS + 1))
        fi
        
        if [ $ERRORS -gt 0 ]; then
          exit 1
        fi
        
    - name: Validate Baseball Section Unit 9 Navigation
      run: |
        echo ""
        echo "🔍 Validating Baseball Section Unit 9 Navigation Links..."
        
        ERRORS=0
        
        for file in super-minds-baseball/index.html super-minds-baseball/unit7/baseball-present-continuous-course.html super-minds-baseball/unit7/baseball-present-continuous-homework.html super-minds-baseball/unit8/baseball-gerunds-ball-sports.html; do
          if [ -f "$file" ]; then
            if grep -q 'window.NAV_CONFIG' "$file"; then
              echo "  ✅ $file uses centralized nav"
            elif grep -q 'unit9' "$file"; then
              echo "  ✅ $file links to unit9"
            else
              echo "  ❌ $file missing link to unit9!"
              ERRORS=$((ERRORS + 1))
            fi
          fi
        done
        
        # Verify common.js has unit9 links
        if grep -q 'unit9' js/common.js; then
          echo "  ✅ js/common.js contains unit9 navigation links"
        else
          echo "  ❌ js/common.js missing unit9 navigation links!"
          ERRORS=$((ERRORS + 1))
        fi
        
        if [ $ERRORS -gt 0 ]; then
          exit 1
        fi
        
    - name: Run Test Script
      run: |
        echo ""
        echo "🔍 Running Test Script..."
        
        if [ -f "test.sh" ]; then
          chmod +x test.sh
          ./test.sh
        else
          echo "  ⚠️ test.sh not found"
        fi
        
    - name: Setup Node.js for Browser Test
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Puppeteer
      run: |
        npm install puppeteer
        
    - name: Run Headless Browser Smoke Test
      run: |
        echo ""
        echo "🔍 Running Headless Browser Smoke Test..."
        
        cat > smoke-test.js << 'TESTSCRIPT'
        const puppeteer = require('puppeteer');
        const http = require('http');
        const fs = require('fs');
        
        // Simple static server
        const server = http.createServer((req, res) => {
          let filePath = '.' + req.url;
          if (filePath === './') filePath = './index.html';
          
          fs.readFile(filePath, (error, content) => {
            if (error) {
              res.writeHead(404);
              res.end('Not Found');
            } else {
              res.writeHead(200, { 'Content-Type': 'text/html' });
              res.end(content);
            }
          });
        });
        
        async function runSmokeTests() {
          await new Promise(resolve => server.listen(8000, resolve));
          console.log('  🚀 Test server started');
          
          const browser = await puppeteer.launch({
            headless: 'new',
            args: ['--no-sandbox', '--disable-setuid-sandbox']
          });
          
          console.log('  🌐 Browser launched (headless mode)');
          
          let passed = 0;
          let failed = 0;
          
          // Test 1: Homepage
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/');
            const title = await page.title();
            if (title.includes('Super Minds')) {
              console.log('  ✅ Homepage loads correctly');
              passed++;
            } else {
              console.log('  ❌ Homepage title incorrect:', title);
              failed++;
            }
            await page.close();
          } catch (e) {
            console.log('  ❌ Homepage test failed:', e.message);
            failed++;
          }
          
          // Test 2: CSS/JS loaded
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/unit7/present-continuous-course.html');
            
            const results = await page.evaluate(() => ({
              hasCommonCSS: !!document.querySelector('link[href*="common.css"]'),
              hasCommonJS: typeof toggleMobileMenu === 'function',
              hasToggleQuiz: typeof toggleQuizAnswer === 'function'
            }));
            
            if (results.hasCommonCSS) { console.log('  ✅ Common CSS loaded'); passed++; }
            else { console.log('  ❌ Common CSS not loaded'); failed++; }
            
            if (results.hasCommonJS) { console.log('  ✅ Common JS loaded'); passed++; }
            else { console.log('  ❌ Common JS not loaded'); failed++; }
            
            if (results.hasToggleQuiz) { console.log('  ✅ Toggle functions available'); passed++; }
            else { console.log('  ❌ Toggle functions missing'); failed++; }
            
            await page.close();
          } catch (e) {
            console.log('  ❌ Resource test failed:', e.message);
            failed += 3;
          }
          
          // Test 3: Interactions work
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/unit7/present-continuous-course.html');
            
            // Helper function for delay
            const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
            
            // Click a quiz item
            const quizItem = await page.$('.quiz-item');
            if (quizItem) {
              await quizItem.click();
              await delay(500);
              
              const isExpanded = await page.evaluate(() => {
                const answer = document.querySelector('.quiz-answer');
                return answer && answer.classList.contains('show');
              });
              
              if (isExpanded) {
                console.log('  ✅ Quiz toggle interaction works');
                passed++;
              } else {
                console.log('  ❌ Quiz toggle not working');
                failed++;
              }
            } else {
              console.log('  ⚠️ No quiz items found to test');
            }
            
            await page.close();
          } catch (e) {
            console.log('  ❌ Interaction test failed:', e.message);
            failed++;
          }
          
          // Test 4: Unit 8 Reading Page
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/unit8/fun-things-we-do-reading.html');
            
            const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
            
            // Check page loaded
            const title = await page.title();
            if (title.includes('Fun Things We Do')) {
              console.log('  ✅ Unit 8 reading page loads correctly');
              passed++;
            } else {
              console.log('  ❌ Unit 8 reading page title incorrect:', title);
              failed++;
            }
            
            // Test todo toggle functionality
            const todoItem = await page.$('.todo-item');
            if (todoItem) {
              await todoItem.click();
              await delay(300);
              
              const isCompleted = await page.evaluate(() => {
                const item = document.querySelector('.todo-item');
                return item && item.classList.contains('completed');
              });
              
              if (isCompleted) {
                console.log('  ✅ Todo toggle interaction works');
                passed++;
              } else {
                console.log('  ❌ Todo toggle not working');
                failed++;
              }
            }
            
            // Test question toggle functionality
            const questionItem = await page.$('.question-item');
            if (questionItem) {
              await questionItem.click();
              await delay(300);
              
              const isExpanded = await page.evaluate(() => {
                const answer = document.querySelector('.answer-section');
                return answer && answer.classList.contains('show');
              });
              
              if (isExpanded) {
                console.log('  ✅ Question toggle interaction works');
                passed++;
              } else {
                console.log('  ❌ Question toggle not working');
                failed++;
              }
            }
            
            // Test speak function exists
            const hasSpeakFunction = await page.evaluate(() => typeof speak === 'function');
            if (hasSpeakFunction) {
              console.log('  ✅ speak() function available');
              passed++;
            } else {
              console.log('  ❌ speak() function missing');
              failed++;
            }
            
            // Test toggleAnswer function exists
            const hasToggleAnswer = await page.evaluate(() => typeof toggleAnswer === 'function');
            if (hasToggleAnswer) {
              console.log('  ✅ toggleAnswer() function available');
              passed++;
            } else {
              console.log('  ❌ toggleAnswer() function missing');
              failed++;
            }
            
            await page.close();
          } catch (e) {
            console.log('  ❌ Unit 8 reading page test failed:', e.message);
            failed += 5;
          }
          
          // Test 5: Navigation Links to Reading Page
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/');
            
            // Check homepage has link to reading page
            const hasHomepageLink = await page.evaluate(() => {
              return !!document.querySelector('a[href="unit8/fun-things-we-do-reading.html"]');
            });
            
            if (hasHomepageLink) {
              console.log('  ✅ Homepage links to reading.html');
              passed++;
            } else {
              console.log('  ❌ Homepage missing link to reading.html');
              failed++;
            }
            
            // Check unit8/gerunds-ball-sports.html has navigation link
            await page.goto('http://localhost:8000/unit8/gerunds-ball-sports.html');
            const hasUnit8NavLink = await page.evaluate(() => {
              return !!document.querySelector('a[href="fun-things-we-do-reading.html"]');
            });
            
            if (hasUnit8NavLink) {
              console.log('  ✅ Unit 8 page has reading.html navigation link');
              passed++;
            } else {
              console.log('  ❌ Unit 8 page missing reading.html navigation link');
              failed++;
            }
            
            // Check unit7/present-continuous-course.html has navigation link
            await page.goto('http://localhost:8000/unit7/present-continuous-course.html');
            const hasUnit7NavLink = await page.evaluate(() => {
              return !!document.querySelector('a[href="../unit8/fun-things-we-do-reading.html"]');
            });
            
            if (hasUnit7NavLink) {
              console.log('  ✅ Unit 7 page has reading.html navigation link');
              passed++;
            } else {
              console.log('  ❌ Unit 7 page missing reading.html navigation link');
              failed++;
            }
            
            await page.close();
          } catch (e) {
            console.log('  ❌ Navigation links test failed:', e.message);
            failed += 3;
          }
          
          // Test 6: Unit 9 Grammar Page
          try {
            const page = await browser.newPage();
            await page.goto('http://localhost:8000/unit9/holiday-plans-grammar-review.html');
            
            const delay = ms => new Promise(resolve => setTimeout(resolve, ms));
            
            // Check page loaded
            const title = await page.title();
            if (title.includes('Unit 9')) {
              console.log('  ✅ Unit 9 page loads correctly');
              passed++;
            } else {
              console.log('  ❌ Unit 9 page title incorrect:', title);
              failed++;
            }
            
            // Check for required elements
            const elements = await page.evaluate(() => ({
              hasGrammarCards: document.querySelectorAll('.grammar-card').length >= 3,
              hasBlanks: document.querySelectorAll('.blank').length >= 30,
              hasTodoItems: document.querySelectorAll('.todo-item').length === 4,
              hasNavigation: !!document.querySelector('nav')
            }));
            
            if (elements.hasGrammarCards) { console.log('  ✅ Unit 9 grammar cards present'); passed++; }
            else { console.log('  ❌ Unit 9 grammar cards missing'); failed++; }
            
            if (elements.hasBlanks) { console.log('  ✅ Unit 9 blanks present'); passed++; }
            else { console.log('  ❌ Unit 9 blanks missing'); failed++; }
            
            if (elements.hasTodoItems) { console.log('  ✅ Unit 9 todo items present'); passed++; }
            else { console.log('  ❌ Unit 9 todo items missing'); failed++; }
            
            if (elements.hasNavigation) { console.log('  ✅ Unit 9 navigation present'); passed++; }
            else { console.log('  ❌ Unit 9 navigation missing'); failed++; }
            
            // Test blank toggle
            const blank = await page.$('.blank');
            if (blank) {
              await blank.click();
              await delay(300);
              const isRevealed = await page.evaluate(() => {
                const el = document.querySelector('.blank');
                return el && el.classList.contains('revealed');
              });
              if (isRevealed) {
                console.log('  ✅ Unit 9 blank toggle works');
                passed++;
              } else {
                console.log('  ❌ Unit 9 blank toggle not working');
                failed++;
              }
            }
            
            // Test todo toggle
            const todoItem = await page.$('.todo-item');
            if (todoItem) {
              await todoItem.click();
              await delay(300);
              const isCompleted = await page.evaluate(() => {
                const item = document.querySelector('.todo-item');
                return item && item.classList.contains('completed');
              });
              if (isCompleted) {
                console.log('  ✅ Unit 9 todo toggle works');
                passed++;
              } else {
                console.log('  ❌ Unit 9 todo toggle not working');
                failed++;
              }
            }
            
            await page.close();
          } catch (e) {
            console.log('  ❌ Unit 9 test failed:', e.message);
            failed += 7;
          }
          
          await browser.close();
          server.close();
          
          console.log('');
          console.log(`  Results: ${passed} passed, ${failed} failed`);
          
          if (failed > 0) {
            process.exit(1);
          }
        }
        
        runSmokeTests();
        TESTSCRIPT
        
        node smoke-test.js
        
    - name: Summary
      run: |
        echo ""
        echo "=========================================="
        echo "  ✅ All Quick Validation Tests Passed!"
        echo "=========================================="
